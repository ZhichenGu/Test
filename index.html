<!DOCTYPE html>
<html>
<head>
    <title>MQTT Remote Control</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; transition: background 0.3s; }
        .btn { padding: 20px 40px; font-size: 24px; cursor: pointer; border-radius: 10px; border: none; box-shadow: 0 4px #999; }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px #666; }
        
        /* 两种视觉状态 */
        .status-off { background-color: #2c3e50; color: white; }
        .status-on { background-color: #f1c40f; color: #333; }
    </style>
</head>
<body class="status-off" id="body">

    <h2 id="info">Device is OFF</h2>
    <button class="btn" onmousedown="sendMsg('1')" onmouseup="sendMsg('0')" ontouchstart="sendMsg('1')" ontouchend="sendMsg('0')">
        按下开启 / 松开关闭
    </button>

    <script>
        const host = "08e06f289404444fab8874648aed4d71.s1.eu.hivemq.cloud";
        const port = 8884; // WebSocket 端口
        const clientID = "web_client_" + Math.random().toString(16).substr(2, 8);
        
        const client = new Paho.MQTT.Client(host, port, clientID);

        client.connect({
            useSSL: true,
            userName: "michael",
            password: "12345678Aa",
            onSuccess: () => { console.log("Connected to HiveMQ"); }
        });

        function sendMsg(val) {
            const message = new Paho.MQTT.Message(val);
            message.destinationName = "home/led/control";
            client.send(message);

            // 切换视觉效果
            const body = document.getElementById('body');
            const info = document.getElementById('info');
            if(val === '1') {
                body.className = 'status-on';
                info.innerText = "Device is ON";
            } else {
                body.className = 'status-off';
                info.innerText = "Device is OFF";
            }
        }
    </script>
</body>
</html>
