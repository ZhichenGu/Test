<!DOCTYPE html>
<html>
<head>
    <title>ESP8266 远程控制</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; transition: background 0.3s; }
        .active { background-color: #2ecc71; color: white; }
        .inactive { background-color: #ecf0f1; color: black; }
        button { padding: 20px 40px; font-size: 20px; cursor: pointer; border: none; border-radius: 8px; }
    </style>
</head>
<body id="bg" class="inactive">
    <h2>ESP8266 互动控制台</h2>
    <button id="ctrlBtn">点击开启 (HIGH)</button>
    <p id="status">正在连接 MQTT...</p>

    <script>
        const host = "08e06f289404444fab8874648aed4d71.s1.eu.hivemq.cloud";
        const port = 8884; // WebSocket TLS 端口
        const topic = "home/esp8266/gpio16";
        
        const client = new Paho.MQTT.Client("wss://" + host + ":" + port + "/mqtt", "web_client_" + Math.random());
        let isOn = false;

        client.connect({
            useSSL: true,
            userName: "michael",
            password: "12345678Aa",
            onSuccess: () => {
                document.getElementById('status').innerText = "已连接到 HiveMQ";
            }
        });

        document.getElementById('ctrlBtn').onclick = function() {
            isOn = !isOn;
            const message = new Paho.MQTT.Message(isOn ? "1" : "0");
            message.destinationName = topic;
            client.send(message);

            // 更新视觉效果
            document.getElementById('bg').className = isOn ? "active" : "inactive";
            this.innerText = isOn ? "点击关闭 (LOW)" : "点击开启 (HIGH)";
        };
    </script>
</body>
</html>
